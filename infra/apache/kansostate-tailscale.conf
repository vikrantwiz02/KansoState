# Catch-all for Tailscale HTTPS proxy → routes by X-Kanso-Target header set by Cloudflare Worker
# Tailscale rewrites Host to "localhost" when forwarding; we route by custom header instead.
<VirtualHost *:80>
    ServerName  localhost
    ServerAlias 127.0.0.1 fusion-virtual-machine.taila689d6.ts.net

    RewriteEngine On
    RequestHeader set X-Forwarded-Proto "https"

    # ── Dashboard ──────────────────────────────────────────────────────────────
    RewriteCond %{HTTP:X-Kanso-Target} ^kansostate\.vikrantkumar\.site$ [NC]
    RewriteRule ^(.*)$ http://127.0.0.1:3010$1 [P,L]

    # ── API — WebSocket ────────────────────────────────────────────────────────
    RewriteCond %{HTTP:X-Kanso-Target} ^api\.kansostate\.vikrantkumar\.site$ [NC]
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteRule ^(.*)$ ws://127.0.0.1:8180$1 [P,L]

    # ── API — HTTP ─────────────────────────────────────────────────────────────
    RewriteCond %{HTTP:X-Kanso-Target} ^api\.kansostate\.vikrantkumar\.site$ [NC]
    RewriteRule ^(.*)$ http://127.0.0.1:8180$1 [P,L]

    # ── Grafana ────────────────────────────────────────────────────────────────
    RewriteCond %{HTTP:X-Kanso-Target} ^grafana\.kansostate\.vikrantkumar\.site$ [NC]
    RewriteRule ^(.*)$ http://127.0.0.1:3011$1 [P,L]

    # ── Direct WebSocket fallback (browser → Tailscale FQDN directly, no Worker) ──
    # When X-Kanso-Target is absent, route /ws* WebSocket paths straight to Sentinel.
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{REQUEST_URI} ^/ws
    RewriteCond %{HTTP:X-Kanso-Target} ^$ [NC]
    RewriteRule ^(.*)$ ws://127.0.0.1:8180$1 [P,L]

    ProxyTimeout 3600

    ErrorLog  ${APACHE_LOG_DIR}/kansostate-ts-error.log
    CustomLog ${APACHE_LOG_DIR}/kansostate-ts-access.log combined
</VirtualHost>
