# KansoState — combined reverse proxy for Tailscale HTTPS Funnel
#
# WHY this file exists:
#   Tailscale Funnel edge servers reject TLS connections where SNI does not
#   match *.taila689d6.ts.net.  To fix Cloudflare error 525, we use two
#   Cloudflare rules:
#     1. HTTP Request Header Modification: add X-KansoHost = {http.host}
#        (captures the original subdomain BEFORE the Origin Rule runs)
#     2. Origin Rule: override Host Header → fusion-virtual-machine.taila689d6.ts.net
#        (Cloudflare also uses this value as the TLS SNI sent to origin)
#
# Traffic path:
#   Browser
#   → Cloudflare (SSL, Host: *.kansostate.vikrantkumar.site)
#     [Transform Rule adds X-KansoHost]
#     [Origin Rule rewrites Host → fusion-virtual-machine.taila689d6.ts.net]
#   → Tailscale HTTPS Funnel (TLS SNI matches *.taila689d6.ts.net ✓)
#   → Apache HTTP :80  (Host: fusion-virtual-machine.taila689d6.ts.net)
#   → Docker container (routes by X-KansoHost)

<VirtualHost *:80>
    ServerName fusion-virtual-machine.taila689d6.ts.net

    RewriteEngine On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For   "%{REMOTE_ADDR}s"
    ProxyTimeout 3600

    # ── api.kansostate.vikrantkumar.site → Sentinel :8180 ───────────────────
    # WebSocket upgrade must be matched before plain HTTP
    RewriteCond %{HTTP:X-KansoHost} ^api\.kansostate\.vikrantkumar\.site$ [NC]
    RewriteCond %{HTTP:Upgrade}     websocket                              [NC]
    RewriteCond %{HTTP:Connection}  upgrade                                [NC]
    RewriteRule ^/?(.*)             ws://127.0.0.1:8180/$1                 [P,L]

    RewriteCond %{HTTP:X-KansoHost} ^api\.kansostate\.vikrantkumar\.site$ [NC]
    RewriteRule ^/?(.*)             http://127.0.0.1:8180/$1               [P,L]

    # ── kansostate.vikrantkumar.site → Dashboard :3010 ──────────────────────
    RewriteCond %{HTTP:X-KansoHost} ^kansostate\.vikrantkumar\.site$      [NC]
    RewriteRule ^/?(.*)             http://127.0.0.1:3010/$1               [P,L]

    # ── grafana.kansostate.vikrantkumar.site → Grafana :3011 ─────────────────
    RewriteCond %{HTTP:X-KansoHost} ^grafana\.kansostate\.vikrantkumar\.site$ [NC]
    RewriteRule ^/?(.*)             http://127.0.0.1:3011/$1               [P,L]

    # ── Fallback: direct Tailscale peer-to-peer access (no X-KansoHost) ──────
    RewriteRule ^/?(.*)             http://127.0.0.1:3010/$1               [P,L]

    ProxyPassReverse / http://127.0.0.1:3010/
    ProxyPassReverse / http://127.0.0.1:8180/
    ProxyPassReverse / http://127.0.0.1:3011/

    ErrorLog  ${APACHE_LOG_DIR}/kansostate-combined-error.log
    CustomLog ${APACHE_LOG_DIR}/kansostate-combined-access.log combined
</VirtualHost>
