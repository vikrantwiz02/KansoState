# Grafana — grafana.kansostate.vikrantkumar.site → localhost:3011
# Traffic path: Browser → Cloudflare → Tailscale TCP Funnel :443 → Apache HTTPS :443 → Docker :3011
<VirtualHost *:80>
    ServerName grafana.kansostate.vikrantkumar.site

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3011/
    ProxyPassReverse / http://127.0.0.1:3011/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For   "%{REMOTE_ADDR}s"

    ErrorLog  ${APACHE_LOG_DIR}/kansostate-grafana-error.log
    CustomLog ${APACHE_LOG_DIR}/kansostate-grafana-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName grafana.kansostate.vikrantkumar.site

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/kansostate.vikrantkumar.site/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/kansostate.vikrantkumar.site/privkey.pem

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3011/
    ProxyPassReverse / http://127.0.0.1:3011/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For   "%{REMOTE_ADDR}s"

    ErrorLog  ${APACHE_LOG_DIR}/kansostate-grafana-error.log
    CustomLog ${APACHE_LOG_DIR}/kansostate-grafana-access.log combined
</VirtualHost>
