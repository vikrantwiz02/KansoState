# Dashboard — kansostate.vikrantkumar.site → localhost:3010
# Traffic path: Browser → Cloudflare → Tailscale TCP Funnel :443 → Apache HTTPS :443 → Docker :3010
<VirtualHost *:80>
    ServerName kansostate.vikrantkumar.site

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3010/
    ProxyPassReverse / http://127.0.0.1:3010/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For   "%{REMOTE_ADDR}s"

    ErrorLog  ${APACHE_LOG_DIR}/kansostate-error.log
    CustomLog ${APACHE_LOG_DIR}/kansostate-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName kansostate.vikrantkumar.site

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/kansostate.vikrantkumar.site/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/kansostate.vikrantkumar.site/privkey.pem

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3010/
    ProxyPassReverse / http://127.0.0.1:3010/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For   "%{REMOTE_ADDR}s"

    ErrorLog  ${APACHE_LOG_DIR}/kansostate-error.log
    CustomLog ${APACHE_LOG_DIR}/kansostate-access.log combined
</VirtualHost>
