# Sentinel API — api.kansostate.vikrantkumar.site → localhost:8180
# Traffic path: Browser → Cloudflare → Tailscale TCP Funnel :443 → Apache HTTPS :443 → Docker :8180
<VirtualHost *:80>
    ServerName api.kansostate.vikrantkumar.site

    ProxyPreserveHost On

    # WebSocket upgrade
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade  [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:8180/$1 [P,L]

    ProxyPass        / http://127.0.0.1:8180/
    ProxyPassReverse / http://127.0.0.1:8180/

    ProxyTimeout 3600

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For   "%{REMOTE_ADDR}s"

    ErrorLog  ${APACHE_LOG_DIR}/kansostate-api-error.log
    CustomLog ${APACHE_LOG_DIR}/kansostate-api-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName api.kansostate.vikrantkumar.site

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/kansostate.vikrantkumar.site/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/kansostate.vikrantkumar.site/privkey.pem

    ProxyPreserveHost On

    # WebSocket upgrade
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade  [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:8180/$1 [P,L]

    ProxyPass        / http://127.0.0.1:8180/
    ProxyPassReverse / http://127.0.0.1:8180/

    ProxyTimeout 3600

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For   "%{REMOTE_ADDR}s"

    ErrorLog  ${APACHE_LOG_DIR}/kansostate-api-error.log
    CustomLog ${APACHE_LOG_DIR}/kansostate-api-access.log combined
</VirtualHost>
