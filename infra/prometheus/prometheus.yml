global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: sentinel
    static_configs:
      - targets: ["sentinel:8080"]
    metrics_path: /metrics

  - job_name: semantic-1
    static_configs:
      - targets: ["semantic-1:8090"]
    metrics_path: /metrics

  - job_name: semantic-2
    static_configs:
      - targets: ["semantic-2:8090"]
    metrics_path: /metrics
