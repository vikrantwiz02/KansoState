run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - misspell

linters-settings:
  goimports:
    local-prefixes: github.com/kansostate/sentinel
  revive:
    rules:
      - name: exported
        disabled: true  # allow unexported types without doc comments

issues:
  exclude-rules:
    # Test files can use any pattern freely
    - path: _test\.go
      linters: [errcheck, revive]
    # Allow empty select blocks in goroutine drain patterns
    - text: "empty-block"
      linters: [revive]
